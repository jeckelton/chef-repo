---
stages:
  - deploy

deploy_to_nagios:
  stage: deploy
  before_script:
    - export CHEF_HOME="/tmp/chef_config"
    - export CHEF_CONFIG="$CHEF_HOME/config.rb"
    - export CHEF_CLIENT_KEY="$CHEF_HOME/jeckelton.pem"
    - export PATH="/opt/chef-workstation/bin:$PATH"
  script:
    - echo "Running Chef client on NagiosNode"
    - knife upload cookbook workstation -c "$CHEF_CONFIG"
    - knife ssh 'name:NagiosNode' 'sudo chef-client' --ssh-user nagios --ssh-password "$nagios_sudo" -c "$CHEF_CONFIG"
  tags:
    - chef-runner
  only:
    - main
  when: on_success
